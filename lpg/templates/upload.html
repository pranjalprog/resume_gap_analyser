<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Document</title>
    <link href="{{url_for('static', filename='styles/upload.css')}}" rel="stylesheet" />
    <link href="{{ url_for('static', filename='styles/navbar.css') }}" rel="stylesheet">
</head>
<body>
    <header>
        {% include 'navbar.html' %}
    </header>
    <div class = 'body-wrapper'>
        <div class="wrapper">
            <h1>Upload Document</h1>
            {% if error %}
            <div class="error-message" style="color: red; margin-bottom: 1rem; padding: 0.5rem; background-color: #ffe6e6; border: 1px solid #ff9999; border-radius: 4px;">
                <p>{{ error }}</p>
            </div>
            {% endif %}
            <form method="POST" action="/upload" enctype="multipart/form-data">
                <input type="text" name="doc_name" placeholder="Name" required><br>
                <textarea name="description" placeholder="Description" required></textarea><br>
                <input type="file" name="file" required>
                <button type="submit">Upload</button>
            </form>
        </div>
    </div>
    <h2>
        
    </h2>
</body>
</html>
